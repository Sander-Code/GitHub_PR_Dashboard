<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub PR Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="light"] {
      --bg: #f6f8fa; --surface: #ffffff; --surface2: #f0f2f5;
      --border: #d0d7de; --text: #1f2328; --text-muted: #636c76;
      --text-hint: #9ba3ab; --accent: #0969da;
      --badge-block-bg: #ffebe9; --badge-block-txt: #a40000; --badge-block-bdr: #ffcecb;
      --badge-ok-bg: #dafbe1;   --badge-ok-txt: #116329;   --badge-ok-bdr: #aceebb;
      --badge-rev-bg: #ddf4ff;  --badge-rev-txt: #0550ae;  --badge-rev-bdr: #b6e3ff;
      --badge-app-bg: #dafbe1;  --badge-app-txt: #116329;  --badge-app-bdr: #aceebb;
      --badge-warn-bg:#fff8c5;  --badge-warn-txt:#7d4e00;  --badge-warn-bdr:#f1e05a;
      --badge-cr-bg: #ffebe9;   --badge-cr-txt: #a40000;   --badge-cr-bdr: #ffcecb;
      --badge-pending-bg:#f0f2f5; --badge-pending-txt:#636c76; --badge-pending-bdr:#d0d7de;
      --input-bg: #f6f8fa;
    }
    :root[data-theme="dark"] {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --text: #e6edf3; --text-muted: #8b949e;
      --text-hint: #484f58; --accent: #58a6ff;
      --badge-block-bg: #5c1118; --badge-block-txt: #ff9a9a; --badge-block-bdr: #8e1c23;
      --badge-ok-bg: #0d3e1a;   --badge-ok-txt: #3fb950;   --badge-ok-bdr: #1a5926;
      --badge-rev-bg: #033d6b;  --badge-rev-txt: #79c0ff;  --badge-rev-bdr: #1158a9;
      --badge-app-bg: #0d3e1a;  --badge-app-txt: #3fb950;  --badge-app-bdr: #1a5926;
      --badge-warn-bg:#3b2a00;  --badge-warn-txt:#e3b341;  --badge-warn-bdr:#5a3e00;
      --badge-cr-bg: #5c1118;   --badge-cr-txt: #ff9a9a;   --badge-cr-bdr: #8e1c23;
      --badge-pending-bg:#21262d; --badge-pending-txt:#8b949e; --badge-pending-bdr:#30363d;
      --input-bg: #0d1117;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 10px; }
    header svg { flex-shrink: 0; }
    header .title { font-size: 15px; font-weight: 600; flex: 1; }
    .theme-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); cursor: pointer; padding: 5px 10px; font-size: 13px; }
    .theme-btn:hover { background: var(--surface2); color: var(--text); }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

    .token-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
    .token-bar label { font-weight: 500; white-space: nowrap; color: var(--text-muted); font-size: 13px; }
    .token-bar input { flex: 1; font-family: monospace; font-size: 13px; padding: 7px 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; }
    .token-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }
    .token-bar button { padding: 7px 18px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .token-bar button:hover { opacity: .88; }
    .token-bar button:disabled { opacity: .5; cursor: default; }

    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .tab { padding: 10px 18px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex; align-items: center; gap: 7px; }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }
    .tab .count { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 0 7px; font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 20px; text-align: center; }
    .tab.active .count { background: var(--accent); color: #fff; border-color: transparent; }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-bar input[type=search] { flex: 1; min-width: 180px; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; }
    .filter-bar input[type=search]:focus { border-color: var(--accent); }
    .filter-bar select { padding: 7px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; cursor: pointer; }
    .filter-count { font-size: 12px; color: var(--text-hint); white-space: nowrap; margin-left: auto; }

    .stats-dropdown { position: relative; }
    .stats-dropdown summary { list-style: none; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 13px; cursor: pointer; user-select: none; white-space: nowrap; }
    .stats-dropdown summary::-webkit-details-marker { display: none; }
    .stats-dropdown summary::after { content: ' ▾'; font-size: 11px; }
    .stats-dropdown[open] summary::after { content: ' ▴'; }
    .stats-dropdown[open] summary { border-color: var(--accent); color: var(--text); }
    .stats-box { position: absolute; right: 0; top: calc(100% + 6px); z-index: 10; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; min-width: 220px; box-shadow: 0 8px 24px rgba(0,0,0,.12); display: flex; flex-direction: column; gap: 8px; }
    .stat-row { display: flex; justify-content: space-between; gap: 24px; font-size: 13px; }
    .stat-label { color: var(--text-muted); }
    .stat-value { font-weight: 600; color: var(--text); white-space: nowrap; }

    .pr-list { display: flex; flex-direction: column; gap: 10px; }
    .pr-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; transition: border-color .15s; }
    .pr-card:hover { border-color: var(--accent); }
    .pr-card.hidden { display: none; }

    .pr-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
    .pr-title-wrap { min-width: 0; }
    .pr-title { font-size: 14px; font-weight: 600; color: var(--accent); text-decoration: none; word-break: break-word; }
    .pr-title:hover { text-decoration: underline; }
    .pr-title-row { display: flex; align-items: baseline; flex-wrap: wrap; gap: 7px; margin-bottom: 4px; }

    .pr-times { display: flex; flex-direction: column; gap: 2px; align-items: flex-end; flex-shrink: 0; }
    .pr-time-row { font-size: 11px; color: var(--text-hint); white-space: nowrap; }
    .pr-time-row.old { color: #cf222e; font-weight: 500; }
    [data-theme="dark"] .pr-time-row.old { color: #ff7b72; }
    .pr-time-label { font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: var(--text-hint); display: block; text-align: right; }

    .repo-label { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid transparent; }
    .pr-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid transparent; }
    .badge-block   { background: var(--badge-block-bg); color: var(--badge-block-txt); border-color: var(--badge-block-bdr); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 340px; }
    .badge-ok      { background: var(--badge-ok-bg);    color: var(--badge-ok-txt);    border-color: var(--badge-ok-bdr); }
    .badge-review  { background: var(--badge-rev-bg);   color: var(--badge-rev-txt);   border-color: var(--badge-rev-bdr); }
    .badge-app     { background: var(--badge-app-bg);   color: var(--badge-app-txt);   border-color: var(--badge-app-bdr); }
    .badge-warn    { background: var(--badge-warn-bg);  color: var(--badge-warn-txt);  border-color: var(--badge-warn-bdr); }
    .badge-neutral { background: var(--surface2); color: var(--text-muted); border-color: var(--border); }
    .badge-cr      { background: var(--badge-cr-bg);    color: var(--badge-cr-txt);    border-color: var(--badge-cr-bdr); }
    .badge-pending { background: var(--badge-pending-bg); color: var(--badge-pending-txt); border-color: var(--badge-pending-bdr); }

    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot-ok { background: #2da44e; } .dot-fail { background: #cf222e; } .dot-pending { background: #bf8700; } .dot-skip { background: #8c959f; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-hint); margin-bottom: 5px; }
    .check-list { display: flex; flex-wrap: wrap; gap: 5px; }

    .state-msg { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
    .state-msg.error { color: var(--badge-block-txt); background: var(--badge-block-bg); border-color: var(--badge-block-bdr); }

    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; color: var(--text-hint); font-size: 12px; padding: 28px 0 16px; }
    .no-results { text-align: center; color: var(--text-hint); font-size: 13px; padding: 30px; display: none; }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
  </svg>
  <span class="title">GitHub PR Dashboard</span>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
</header>

<div class="container">
  <div class="token-bar">
    <label for="tkn">Token</label>
    <input type="password" id="tkn" placeholder="ghp_ or github_pat_..." autocomplete="off" />
    <button id="loadBtn" onclick="load()">Load</button>
  </div>
  <div id="errorBox"></div>

  <div class="tabs">
    <button class="tab active" id="tabMine"    onclick="switchTab('mine')">My PRs <span class="count" id="cntMine">—</span></button>
    <button class="tab"        id="tabInvited" onclick="switchTab('invited')">Review requests <span class="count" id="cntInvited">—</span></button>
  </div>

  <div class="filter-bar" id="filterMine" style="display:none">
    <input type="search" id="searchMine" placeholder="Search title, repo…" oninput="applyFilters('mine')" />
    <select id="repoMine" onchange="applyFilters('mine')"><option value="">All repos</option></select>
    <select id="sortMine" onchange="applyFilters('mine')">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="activity">Last activity</option>
    </select>
    <span class="filter-count" id="fcMine"></span>
    <details class="stats-dropdown" id="statsMine"><summary>Stats</summary><div class="stats-box" id="statsBoxMine"></div></details>
  </div>

  <div class="filter-bar" id="filterInvited" style="display:none">
    <input type="search" id="searchInvited" placeholder="Search title, repo, author…" oninput="applyFilters('invited')" />
    <select id="repoInvited" onchange="applyFilters('invited')"><option value="">All repos</option></select>
    <select id="sortInvited" onchange="applyFilters('invited')">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="activity">Last activity</option>
    </select>
    <select id="reviewedInvited" onchange="applyFilters('invited')">
      <option value="all">All PRs</option>
      <option value="pending">Not reviewed yet</option>
      <option value="reviewed">Already reviewed</option>
    </select>
    <span class="filter-count" id="fcInvited"></span>
    <details class="stats-dropdown" id="statsInvited"><summary>Stats</summary><div class="stats-box" id="statsBoxInvited"></div></details>
  </div>

  <div id="mine"><div class="state-msg">Enter your token and click <strong>Load</strong>.</div></div>
  <div id="invited" style="display:none"><div class="state-msg">Enter your token and click <strong>Load</strong>.</div></div>
</div>

<footer>All data is fetched directly from the GitHub API — your token is never stored or sent anywhere else.</footer>

<script>
/* ── state in closure — niet globaal bereikbaar ─────────────── */
const state = (() => {
  let _token = '', _me = '';
  return {
    get token() { return _token; },
    set token(v) { _token = v; },
    get me() { return _me; },
    set me(v) { _me = v; },
    clear() { _token = ''; _me = ''; }
  };
})();

let prData = { mine: [], invited: [] };

/* ── utils ──────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function timeAgo(dateStr) {
  const d = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (d === 0) return 'today';
  if (d === 1) return '1 day ago';
  if (d < 7) return d + ' days ago';
  if (d < 30) return Math.floor(d/7) + ' weeks ago';
  if (d < 365) return Math.floor(d/30) + ' months ago';
  return Math.floor(d/365) + 'y ' + Math.floor((d%365)/30) + 'mo ago';
}
function isOld(dateStr) { return (Date.now() - new Date(dateStr)) / 86400000 > 14; }

/* ── theme ──────────────────────────────────────────────────── */
const html = document.documentElement;
function toggleTheme() {
  const dark = html.dataset.theme === 'dark';
  html.dataset.theme = dark ? 'light' : 'dark';
  $('themeBtn').textContent = dark ? '🌙 Dark' : '☀️ Light';
  localStorage.setItem('gh-dash-theme', html.dataset.theme);
}
(function() {
  const saved = localStorage.getItem('gh-dash-theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  html.dataset.theme = saved;
  window.addEventListener('DOMContentLoaded', () => {
    $('themeBtn').textContent = saved === 'dark' ? '☀️ Light' : '🌙 Dark';
  });
})();

/* ── repo label colours ─────────────────────────────────────── */
const REPO_PALETTES = [
  ['#dbeafe','#1e40af','#93c5fd'], ['#fce7f3','#9d174d','#f9a8d4'],
  ['#d1fae5','#065f46','#6ee7b7'], ['#fef3c7','#92400e','#fcd34d'],
  ['#ede9fe','#4c1d95','#c4b5fd'], ['#ffedd5','#7c2d12','#fdba74'],
  ['#cffafe','#164e63','#67e8f9'], ['#f0fdf4','#14532d','#86efac'],
  ['#fdf4ff','#701a75','#e879f9'], ['#fff1f2','#881337','#fda4af'],
];
const DARK_REPO_PALETTES = [
  ['#1e3a5f','#93c5fd','#1e40af'], ['#4a0e2b','#f9a8d4','#9d174d'],
  ['#064e3b','#6ee7b7','#065f46'], ['#451a03','#fcd34d','#92400e'],
  ['#2e1065','#c4b5fd','#4c1d95'], ['#431407','#fdba74','#7c2d12'],
  ['#083344','#67e8f9','#164e63'], ['#052e16','#86efac','#14532d'],
  ['#3b0764','#e879f9','#701a75'], ['#4c0519','#fda4af','#881337'],
];
const repoColorMap = {};
let repoColorIdx = 0;
function getRepoStyle(repoFull) {
  if (repoColorMap[repoFull] === undefined) repoColorMap[repoFull] = repoColorIdx++ % 10;
  const [bg, txt, bdr] = (html.dataset.theme === 'dark' ? DARK_REPO_PALETTES : REPO_PALETTES)[repoColorMap[repoFull]];
  return `background:${bg};color:${txt};border-color:${bdr};`;
}
function repoLabelHtml(owner, repo) {
  const full = owner + '/' + repo;
  return `<span class="repo-label" data-repo="${esc(full)}" style="${getRepoStyle(full)}">${esc(owner)}/${esc(repo)}</span>`;
}
function refreshRepoColors() {
  document.querySelectorAll('[data-repo]').forEach(el => { el.style.cssText = getRepoStyle(el.dataset.repo); });
}

/* ── GitHub API — één definitie ─────────────────────────────── */
async function gh(path) {
  const r = await fetch('https://api.github.com' + path, {
    headers: {
      Authorization: 'Bearer ' + state.token,
      Accept: 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    }
  });
  if (!r.ok) throw Object.assign(new Error(r.statusText), { status: r.status });
  return r.json();
}

async function searchPRs(q) {
  const d = await gh('/search/issues?q=' + encodeURIComponent(q) + '&per_page=50&sort=updated');
  return d.items || [];
}
async function getReviews(o, r, n) {
  try { return await gh(`/repos/${o}/${r}/pulls/${n}/reviews`); } catch { return []; }
}
async function getPRDetail(o, r, n) {
  try { return await gh(`/repos/${o}/${r}/pulls/${n}`); } catch { return null; }
}
async function getProtection(o, r, branch) {
  // Gebruik een stille fetch: 404 is normaal als er geen protection is of geen rechten
  try {
    const res = await fetch(`https://api.github.com/repos/${o}/${r}/branches/${encodeURIComponent(branch)}/protection`, {
      headers: { Authorization: 'Bearer ' + state.token, Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' }
    });
    if (!res.ok) return null; // 404 / 403 — geen protection of geen rechten, geen consolefout
    return res.json();
  } catch { return null; }
}
async function getWorkflowRuns(o, r, sha) {
  try {
    const d = await gh(`/repos/${o}/${r}/actions/runs?per_page=50&head_sha=${sha}`);
    return d.workflow_runs || [];
  } catch { return []; }
}

function repoFromUrl(url) {
  return url.replace('https://api.github.com/repos/', '').split('/').slice(0, 2);
}

/* ── badges ─────────────────────────────────────────────────── */
function workflowBadge(run) {
  const name = esc(run.name || run.display_title || 'Workflow');
  if (run.status !== 'completed')
    return `<span class="badge badge-warn"><span class="dot dot-pending"></span>${name} (running)</span>`;
  if (run.conclusion === 'success')
    return `<span class="badge badge-ok"><span class="dot dot-ok"></span>${name}</span>`;
  if (run.conclusion === 'failure' || run.conclusion === 'timed_out')
    return `<span class="badge badge-block"><span class="dot dot-fail"></span>${name}</span>`;
  return `<span class="badge badge-neutral"><span class="dot dot-skip"></span>${name}</span>`;
}

function blockingRules(prot, approvals) {
  if (!prot) return [];
  const rules = [];
  const rr = prot.required_pull_request_reviews;
  if (rr) {
    const need = rr.required_approving_review_count || 1;
    if (approvals < need) rules.push(`Requires ${need} approval(s) — ${approvals} received`);
    if (rr.require_code_owner_reviews) rules.push('Code-owner review required');
    if (rr.dismiss_stale_reviews) rules.push('Stale reviews are dismissed');
  }
  if (prot.required_status_checks?.strict) rules.push('Branch must be up-to-date with base');
  return rules;
}

function protectionHtml(blocking) {
  return blocking.length
    ? blocking.map(b => `<span class="badge badge-block" title="${esc(b)}">⚠ ${esc(b)}</span>`).join('')
    : '<span class="badge badge-ok">✓ No blockers found</span>';
}

/* ── eigen reviewstatus ─────────────────────────────────────── */
function myReviewStatus(reviews, me) {
  const mine = reviews
    .filter(r => r.user?.login === me && r.state !== 'DISMISSED')
    .sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at));
  return mine.length ? mine[0].state : null;
}

function myReviewBadge(status) {
  if (status === 'APPROVED')           return `<span class="badge badge-ok">✓ You approved</span>`;
  if (status === 'CHANGES_REQUESTED')  return `<span class="badge badge-cr">✗ You requested changes</span>`;
  if (status === 'COMMENTED')          return `<span class="badge badge-review">💬 You commented</span>`;
  return `<span class="badge badge-pending">⏳ Not reviewed yet</span>`;
}

/* ── stats ──────────────────────────────────────────────────── */
function renderStats(items, el) {
  if (!el) return;
  if (!items.length) { el.innerHTML = '<div class="stat-row"><span class="stat-label">No PRs visible</span></div>'; return; }
  const now = Date.now();
  const ages = items.map(d => (now - new Date(d.createdAt)) / 86400000);
  const acts  = items.map(d => (now - new Date(d.updatedAt)) / 86400000);
  const fmt = d => d < 1 ? 'today' : d < 7 ? Math.round(d) + 'd' : Math.round(d/7) + 'w ' + Math.round(d%7) + 'd';
  el.innerHTML = `
    <div class="stat-row"><span class="stat-label">Visible PRs</span><span class="stat-value">${items.length}</span></div>
    <div class="stat-row"><span class="stat-label">Oldest open</span><span class="stat-value">${fmt(Math.max(...ages))}</span></div>
    <div class="stat-row"><span class="stat-label">Avg age</span><span class="stat-value">${fmt(ages.reduce((a,b)=>a+b,0)/ages.length)}</span></div>
    <div class="stat-row"><span class="stat-label">Longest without activity</span><span class="stat-value">${fmt(Math.max(...acts))}</span></div>`;
}

/* ── filters ─────────────────────────────────────────────────── */
function populateRepoFilter(tab) {
  const sel = $(tab === 'mine' ? 'repoMine' : 'repoInvited');
  const repos = [...new Set(prData[tab].map(d => d.repoFull))].sort();
  sel.innerHTML = '<option value="">All repos</option>' + repos.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join('');
}

function applyFilters(tab) {
  const isMine   = tab === 'mine';
  const searchEl = $(isMine ? 'searchMine'   : 'searchInvited');
  const repoEl   = $(isMine ? 'repoMine'     : 'repoInvited');
  const sortEl   = $(isMine ? 'sortMine'     : 'sortInvited');
  const fcEl     = $(isMine ? 'fcMine'       : 'fcInvited');
  const statsEl  = $(isMine ? 'statsBoxMine' : 'statsBoxInvited');

  const q        = searchEl.value.toLowerCase();
  const repo     = repoEl.value;
  const sort     = sortEl.value;
  const reviewed = isMine ? 'all' : ($('reviewedInvited')?.value || 'all');

  let items = prData[tab].slice().filter(d => {
    if (repo && d.repoFull !== repo) return false;
    if (q && !d.searchText.includes(q)) return false;
    if (reviewed === 'pending'  &&  d.myReviewed) return false;
    if (reviewed === 'reviewed' && !d.myReviewed) return false;
    return true;
  });

  if (sort === 'newest')   items.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  if (sort === 'oldest')   items.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  if (sort === 'activity') items.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));

  const list = document.getElementById(tab).querySelector('.pr-list');
  if (!list) return;
  const cardMap = {};
  list.querySelectorAll('.pr-card').forEach(c => { cardMap[c.dataset.num] = c; c.classList.add('hidden'); });

  const visNums = new Set(items.map(d => d.num));
  items.forEach((d, i) => { const c = cardMap[d.num]; if (c) { c.classList.remove('hidden'); c.style.order = i; } });

  let noRes = list.parentElement.querySelector('.no-results');
  if (!noRes) { noRes = document.createElement('div'); noRes.className = 'no-results'; list.parentElement.appendChild(noRes); noRes.textContent = 'No results match your filters.'; }
  noRes.style.display = visNums.size === 0 ? 'block' : 'none';

  fcEl.textContent = `${visNums.size} of ${prData[tab].length}`;
  renderStats(items, statsEl);
  refreshRepoColors();
}

/* ── tab switch ─────────────────────────────────────────────── */
function switchTab(id) {
  ['mine','invited'].forEach(t => {
    $(t).style.display = t === id ? '' : 'none';
    $('tab' + t[0].toUpperCase() + t.slice(1)).classList.toggle('active', t === id);
    $('filter' + t[0].toUpperCase() + t.slice(1)).style.display = (t === id && prData[t].length > 0) ? 'flex' : 'none';
  });
}

/* ── load mine ───────────────────────────────────────────────── */
async function loadMine() {
  $('mine').innerHTML = '<div class="state-msg"><span class="spinner"></span>Fetching your PRs…</div>';
  const items = await searchPRs('is:pr is:open author:' + state.me);
  $('cntMine').textContent = items.length;
  if (!items.length) { $('mine').innerHTML = '<div class="state-msg">No open PRs found.</div>'; return; }

  const rows = await Promise.all(items.map(async pr => {
    const [owner, repo] = repoFromUrl(pr.repository_url);
    const [detail, reviews] = await Promise.all([getPRDetail(owner, repo, pr.number), getReviews(owner, repo, pr.number)]);
    const approvals = reviews.filter(r => r.state === 'APPROVED').length;
    const uniqueReviewers = new Set(reviews.filter(r => r.state !== 'DISMISSED').map(r => r.user?.login)).size;
    const prot = detail?.base?.ref ? await getProtection(owner, repo, detail.base.ref) : null;
    const blocking = blockingRules(prot, approvals);
    const repoFull = owner + '/' + repo;
    const updatedAt = pr.updated_at || pr.created_at;
    return {
      num: String(pr.number), repoFull, myReviewed: false,
      searchText: (pr.title + ' ' + repoFull).toLowerCase(),
      createdAt: pr.created_at, updatedAt,
      html: buildMineCard(pr, owner, repo, approvals, uniqueReviewers, blocking, updatedAt)
    };
  }));

  prData.mine = rows;
  $('mine').innerHTML = '<div class="pr-list" style="display:flex;flex-direction:column;gap:10px">' + rows.map(r => r.html).join('') + '</div>';
  populateRepoFilter('mine');
  $('filterMine').style.display = 'flex';
  applyFilters('mine');
}

function buildMineCard(pr, owner, repo, approvals, uniqueReviewers, blocking, updatedAt) {
  const ageOld = isOld(pr.created_at) ? ' old' : '';
  const actOld = isOld(updatedAt) ? ' old' : '';
  return `<div class="pr-card" data-num="${pr.number}" data-created="${pr.created_at}" data-updated="${updatedAt}">
    <div class="pr-top">
      <div class="pr-title-wrap">
        <div class="pr-title-row">
          ${repoLabelHtml(owner, repo)}
          <a class="pr-title" href="${esc(pr.html_url)}" target="_blank" rel="noopener">#${pr.number} ${esc(pr.title)}</a>
        </div>
      </div>
      <div class="pr-times">
        <span class="pr-time-label">opened</span>
        <span class="pr-time-row${ageOld}">${timeAgo(pr.created_at)}</span>
        <span class="pr-time-label" style="margin-top:4px">last activity</span>
        <span class="pr-time-row${actOld}">${timeAgo(updatedAt)}</span>
      </div>
    </div>
    <div class="pr-meta">
      <span class="badge badge-review">👤 ${uniqueReviewers} reviewer${uniqueReviewers!==1?'s':''}</span>
      <span class="badge badge-app">✓ ${approvals} approval${approvals!==1?'s':''}</span>
    </div>
    <hr class="divider"/>
    <div class="section-label">Branch protection</div>
    <div class="check-list">${protectionHtml(blocking)}</div>
  </div>`;
}

/* ── load invited ────────────────────────────────────────────── */
async function loadInvited() {
  $('invited').innerHTML = '<div class="state-msg"><span class="spinner"></span>Fetching review requests…</div>';
  const items = await searchPRs('is:pr is:open review-requested:' + state.me);
  $('cntInvited').textContent = items.length;
  if (!items.length) { $('invited').innerHTML = '<div class="state-msg">No review requests found.</div>'; return; }

  const rows = await Promise.all(items.map(async pr => {
    const [owner, repo] = repoFromUrl(pr.repository_url);
    const [detail, reviews] = await Promise.all([getPRDetail(owner, repo, pr.number), getReviews(owner, repo, pr.number)]);

    // Alles afgeleid van reviews — myStatus vóór alles wat het gebruikt
    const approvals       = reviews.filter(r => r.state === 'APPROVED').length;
    const uniqueReviewers = new Set(reviews.filter(r => r.state !== 'DISMISSED').map(r => r.user?.login)).size;
    const myStatus        = myReviewStatus(reviews, state.me);
    const myReviewed      = myStatus !== null;

    // Branch protection
    const prot    = detail?.base?.ref ? await getProtection(owner, repo, detail.base.ref) : null;
    const blocking = blockingRules(prot, approvals);

    // CI: workflow runs
    let ciHtml = '<span class="badge badge-neutral">No workflows found</span>';
    if (detail?.head?.sha) {
      const runs = await getWorkflowRuns(owner, repo, detail.head.sha);
      if (runs.length) {
        const latest = {};
        runs.forEach(run => {
          const key = run.name || run.id;
          if (!latest[key] || new Date(run.created_at) > new Date(latest[key].created_at)) latest[key] = run;
        });
        ciHtml = Object.values(latest).map(workflowBadge).join('');
      }
    }

    const repoFull  = owner + '/' + repo;
    const author    = pr.user?.login || '?';
    const updatedAt = pr.updated_at || pr.created_at;
    return {
      num: String(pr.number), repoFull, myReviewed,
      searchText: (pr.title + ' ' + repoFull + ' ' + author).toLowerCase(),
      createdAt: pr.created_at, updatedAt,
      html: buildInvitedCard(pr, owner, repo, author, approvals, uniqueReviewers, myStatus, blocking, ciHtml, updatedAt)
    };
  }));

  prData.invited = rows;
  $('invited').innerHTML = '<div class="pr-list" style="display:flex;flex-direction:column;gap:10px">' + rows.map(r => r.html).join('') + '</div>';
  populateRepoFilter('invited');
  $('filterInvited').style.display = 'flex';
  applyFilters('invited');
}

function buildInvitedCard(pr, owner, repo, author, approvals, uniqueReviewers, myStatus, blocking, ciHtml, updatedAt) {
  const ageOld = isOld(pr.created_at) ? ' old' : '';
  const actOld = isOld(updatedAt) ? ' old' : '';
  return `<div class="pr-card" data-num="${pr.number}" data-created="${pr.created_at}" data-updated="${updatedAt}">
    <div class="pr-top">
      <div class="pr-title-wrap">
        <div class="pr-title-row">
          ${repoLabelHtml(owner, repo)}
          <a class="pr-title" href="${esc(pr.html_url)}" target="_blank" rel="noopener">#${pr.number} ${esc(pr.title)}</a>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:3px">by <strong>${esc(author)}</strong></div>
      </div>
      <div class="pr-times">
        <span class="pr-time-label">opened</span>
        <span class="pr-time-row${ageOld}">${timeAgo(pr.created_at)}</span>
        <span class="pr-time-label" style="margin-top:4px">last activity</span>
        <span class="pr-time-row${actOld}">${timeAgo(updatedAt)}</span>
      </div>
    </div>
    <div class="pr-meta">
      <span class="badge badge-review">👤 ${uniqueReviewers} reviewer${uniqueReviewers!==1?'s':''}</span>
      <span class="badge badge-app">✓ ${approvals} approval${approvals!==1?'s':''}</span>
      ${myReviewBadge(myStatus)}
    </div>
    <hr class="divider"/>
    <div class="section-label">Branch protection</div>
    <div class="check-list" style="margin-bottom:8px">${protectionHtml(blocking)}</div>
    <div class="section-label">CI / GitHub Actions</div>
    <div class="check-list">${ciHtml}</div>
  </div>`;
}

/* ── main load ───────────────────────────────────────────────── */
async function load() {
  state.token = $('tkn').value.trim();
  $('errorBox').innerHTML = '';
  if (!state.token) { showError('Please enter a GitHub Personal Access Token.'); return; }
  $('loadBtn').disabled = true; $('loadBtn').textContent = 'Loading…';
  prData = { mine: [], invited: [] };
  try {
    const me = await gh('/user');
    state.me = me.login;
    await Promise.all([loadMine(), loadInvited()]);
  } catch(e) {
    showError(e.message);
    $('mine').innerHTML = '<div class="state-msg">Could not load data.</div>';
    $('invited').innerHTML = '<div class="state-msg">Could not load data.</div>';
  } finally {
    $('loadBtn').disabled = false; $('loadBtn').textContent = 'Load';
  }
}

function showError(msg) {
  $('errorBox').innerHTML = `<div class="state-msg error" style="margin-bottom:16px">⚠ ${esc(msg)}</div>`;
}

$('tkn').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });

const observer = new MutationObserver(() => refreshRepoColors());
observer.observe(html, { attributes: true, attributeFilter: ['data-theme'] });
</script>
